name: Internship check

on:
  schedule:
    # 05:00/17:00 UTC = 07:00/19:00 CEST (summer), 06:00/18:00 CET (winter)
    - cron: "0 5,17 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: tracker
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Run tracker
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: python3 tracker.py

      - name: Commit updated state and status page
        run: |
          git config user.name "internship-tracker-bot"
          git config user.email "actions@users.noreply.github.com"
          git add state.json STATUS.md docs/index.html
          if ! git diff --cached --quiet; then
            git commit -m "check: $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi
